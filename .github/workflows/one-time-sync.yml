name: One-Time Sync 3.9.3 (N9G9 -> N8G8)
on:
  workflow_dispatch: # 只允许手动触发，绝不自动跑

jobs:
  copy-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy Release from N9G9 to N8G8
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: "sowahsun/N9G9"
          TARGET_REPO: "sowahsun/N8G8"
          TAG_NAME: "OKPRO-3.9.3" # 👈 如果你在 N9G9 的标签名不是这个，请修改这里
        run: |
          echo "🔍 正在从 $SOURCE_REPO 获取 $TAG_NAME 的信息..."
          
          # 获取源仓库指定 Tag 的 Release 数据
          release_data=$(gh api repos/$SOURCE_REPO/releases/tags/$TAG_NAME)
          
          if [ -z "$release_data" ] || [ "$release_data" == "null" ] || echo "$release_data" | grep -q "Not Found"; then
            echo "❌ 找不到标签为 $TAG_NAME 的 Release！请检查 TAG_NAME 是否正确。"
            exit 1
          fi
          
          # 检查目标仓库是否已经存在该 Release
          if gh release view "$TAG_NAME" -R "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ 目标仓库 $TARGET_REPO 已存在 $TAG_NAME，无需重复搬家。"
            exit 0
          fi
          
          echo "🚀 开始在 $TARGET_REPO 创建 Release: $TAG_NAME"
          title=$(echo "$release_data" | jq -r '.name // "'$TAG_NAME'"')
          echo "$release_data" | jq -r '.body // "Archived 3.9.3 Collection"' > release_notes.txt
          
          # 创建新的 Release 壳子
          gh release create "$TAG_NAME" -R "$TARGET_REPO" --title "$title" --notes-file release_notes.txt
          
          echo "⬇️ 开始高速内网下载并上传附件..."
          # 提取所有的文件下载链接
          assets=$(echo "$release_data" | jq -r '.assets[] | .browser_download_url')
          
          for url in $assets; do
            orig_name=$(basename "$url")
            echo "⬇️ 正在下载 $orig_name ..."
            curl -L -o "$orig_name" "$url"
            
            echo "⬆️ 正在上传 $orig_name 到 $TARGET_REPO ..."
            gh release upload "$TAG_NAME" "$orig_name" --clobber -R "$TARGET_REPO"
            
            rm -f "$orig_name"
          done
          
          echo "🎉 搬家大业顺利完成！"
