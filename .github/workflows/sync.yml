name: N8G8 - Dual Engine Sync (FM Pro & FongMi)
on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 00:00 自动巡检
  workflow_dispatch:      # 允许随时在 Actions 页面手动触发

jobs:
  # -------------------------------------------------------------------
  # 任务 1：FongMi 影视同步 (先跑这个，让它垫底)
  # -------------------------------------------------------------------
  fongmi_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Instant Sync FongMi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: "sowahsun/N8G8"
          PREFIX: "FongMi-v"
        run: |
          echo "🔍 正在读取 FongMi 目录文件..."
          # 获取 apk 文件夹下的所有文件内容
          contents=$(gh api repos/FongMi/Release/contents/apk?ref=fongmi)
          
          # 寻找 leanback.json 以提取版本号
          json_url=$(echo "$contents" | jq -r '.[] | select(.name=="leanback.json") | .download_url')
          
          if [ -z "$json_url" ] || [ "$json_url" == "null" ]; then
            echo "❌ 找不到 leanback.json，无法获取版本号。"
            exit 0
          fi
          
          echo "📄 正在解析 leanback.json..."
          json_data=$(curl -sL "$json_url")
          version=$(echo "$json_data" | jq -r '.name')
          
          if [ -z "$version" ] || [ "$version" == "null" ]; then
            echo "❌ 无法解析版本号，跳过同步。"
            exit 0
          fi
          
          my_tag="${PREFIX}${version}"
          
          if gh release view "$my_tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ FongMi 版本 $my_tag 已存在，跳过。"
            exit 0
          fi
          
          echo "🚀 发现 FongMi 新版本: $version"
          # 提取更新日志并保存到文本（避免换行符导致命令错误）
          echo "$json_data" | jq -r '.desc // "FongMi 自动同步更新"' > fongmi_notes.txt
          
          # 创建 Release
          gh release create "$my_tag" -R "$TARGET_REPO" --title "FongMi 影视: $version" --notes-file fongmi_notes.txt
          
          # 筛选出所有的 apk 文件进行下载和上传
          apk_urls=$(echo "$contents" | jq -r '.[] | select(.name | endswith(".apk")) | .download_url')
          for url in $apk_urls; do
            orig_name=$(basename "$url")
            echo "⬇️ 正在下载 $orig_name..."
            curl -sL -o "$orig_name" "$url"
            echo "⬆️ 正在上传 $orig_name..."
            gh release upload "$my_tag" "$orig_name" --clobber -R "$TARGET_REPO"
            rm -f "$orig_name"
          done

  # -------------------------------------------------------------------
  # 任务 2：FMApp 增量同步 (精准筛选 PRO 版)
  # -------------------------------------------------------------------
  fmapp_pro_sync:
    needs: fongmi_sync  # 强制等待 fongmi_sync 任务执行完毕
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Instant Sync FMApp Pro
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: "sowahsun/N8G8"
          SOURCE_REPO: "lystv/fmapp"
          PREFIX: "FM-"
        run: |
          echo "🔍 正在获取 $SOURCE_REPO 的最新 PRO 版本..."
          latest_rel=$(gh api repos/$SOURCE_REPO/releases | jq -c '[.[] | select(.tag_name | ascii_downcase | contains("pro"))][0]')
          
          if [ "$latest_rel" == "null" ] || [ -z "$latest_rel" ]; then
            echo "❌ 未找到包含 pro 的新版本，跳过同步。"
            exit 0
          fi

          raw_tag=$(echo "$latest_rel" | jq -r '.tag_name')
          my_tag="${PREFIX}${raw_tag}"
          
          if gh release view "$my_tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ FMApp 版本 $my_tag 已存在，跳过。"
            exit 0
          fi

          echo "🚀 发现 FMApp 新版本: $raw_tag"
          title=$(echo "$latest_rel" | jq -r '.name // "New FM Release"')
          echo "$latest_rel" | jq -r '.body // "Incremental Update"' > release_notes.txt

          gh release create "$my_tag" -R "$TARGET_REPO" --title "FMApp: $title" --notes-file release_notes.txt

          assets=$(echo "$latest_rel" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')
          for url in $assets; do
            orig_name=$(basename "$url")
            curl -L -o "$orig_name" "$url"
            gh release upload "$my_tag" "$orig_name" --clobber -R "$TARGET_REPO"
            rm -f "$orig_name"
          done

  # -------------------------------------------------------------------
  # 任务 3：FMApp Base版 同步 (过滤掉 PRO 版，生成纯净 Base 标签)
  # -------------------------------------------------------------------
  fmapp_base_sync:
    needs: fmapp_pro_sync  # 等待 Pro 版跑完再跑 Base 版
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Instant Sync FMApp Base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: "sowahsun/N8G8"
          SOURCE_REPO: "lystv/fmapp"
          PREFIX: "ok-base-"
        run: |
          echo "🔍 正在获取 $SOURCE_REPO 的最新 BASE 版本..."
          # 利用 | not 排除带有 pro 的标签，抓取纯净 Base 版
          latest_rel=$(gh api repos/$SOURCE_REPO/releases | jq -c '[.[] | select((.tag_name | ascii_downcase | contains("pro")) | not)][0]')
          
          if [ "$latest_rel" == "null" ] || [ -z "$latest_rel" ]; then
            echo "❌ 未找到 Base 版本，跳过同步。"
            exit 0
          fi

          raw_tag=$(echo "$latest_rel" | jq -r '.tag_name')
          my_tag="${PREFIX}${raw_tag}"
          
          if gh release view "$my_tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
            echo "✅ FMApp Base 版本 $my_tag 已存在，跳过。"
            exit 0
          fi

          echo "🚀 发现 FMApp Base 新版本: $raw_tag"
          title=$(echo "$latest_rel" | jq -r '.name // "New FM Base Release"')
          echo "$latest_rel" | jq -r '.body // "Incremental Update"' > release_notes_base.txt

          gh release create "$my_tag" -R "$TARGET_REPO" --title "FMApp Base: $title" --notes-file release_notes_base.txt

          assets=$(echo "$latest_rel" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')
          for url in $assets; do
            orig_name=$(basename "$url")
            curl -L -o "$orig_name" "$url"
            gh release upload "$my_tag" "$orig_name" --clobber -R "$TARGET_REPO"
            rm -f "$orig_name"
          done

  # -------------------------------------------------------------------
  # 任务 4：单纯提取 Release 生成 list.json (最终清算)
  # -------------------------------------------------------------------
  generate_release_index:
    needs: fmapp_base_sync # 确保前三个引擎都跑完之后，再来收网
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 提取 Release 并生成 list.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 初始化 Git
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          echo "🟠 正在扫描 N8G8 仓库的所有 Release 资产..."
          
          # 【核心修复】将 --jq 替换为 | jq，利用原生 jq 的默认美化缩进功能生成结构化 JSON
          gh api repos/${{ github.repository }}/releases | jq '
            [.[] | {tag: .tag_name, assets: .assets}] | map(select(.assets | length > 0)) 
            | [.[] | .tag as $tag | .assets[] | select(.name | endswith(".apk")) | {
                name: ("[" + $tag + "] " + .name), 
                type: "release_asset", 
                path: ("Releases/" + $tag + "/" + .name), 
                time: .updated_at,
                url: .browser_download_url
              }]
          ' > list.json
          
          # 提交到代码库
          git add list.json
          git commit -m "System: Auto-generate pretty list.json from Releases" || exit 0
          git push origin main
